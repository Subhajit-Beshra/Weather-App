<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Weather App</h1>
        </div>
        <div class="search">
            <input type="text" placeholder="Enter city name" id="cityInput">
            <button onclick = "genInfo()"><span class="material-symbols-outlined">search</span></button>
        </div>
        <div class="info">
            <div class="loader"></div>
            <div class="weather-info" style="display: none;">
                <div class="city">
                    <h1>City Name <span class="material-symbols-outlined city-icon">location_city</span></h1>
                </div>
                <div class="temperature">
                    <h3>Temperature <span class="material-symbols-outlined temp-icon">device_thermostat</span></h3>
                </div>
                <div class="condition">
                    <h4>Condition <span class="material-symbols-outlined condition-icon">info</span></h4>
                </div>
                <div class="humidity">
                    <h5>Humidity <span class="material-symbols-outlined humidity-icon">humidity_percentage</span></h5>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
